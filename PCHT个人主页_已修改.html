<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCHT - 个人主页</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            line-height: 1.6; 
            color: #e0e0e0;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* 星空背景 - 深蓝渐变 */
        .stars-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(to bottom, #000000 0%, #0a0a2a 20%, #1a1a3a 40%, #0f0f23 100%);
        }

        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            animation: twinkle 3s infinite ease-in-out;
        }

        /* 星星闪烁动画 */
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* 大星星特效 */
        .star.large {
            animation: twinkle-large 4s infinite ease-in-out;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        @keyframes twinkle-large {
            0%, 100% { opacity: 0.4; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.3); box-shadow: 0 0 20px rgba(255, 255, 255, 0.9); }
        }

        /* 毛玻璃主容器 */
        .container { 
            max-width: 800px; 
            margin: 0 auto; 
            padding: 40px 20px;
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .main-content {
            background: rgba(20, 20, 40, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 25px;
            border: 1px solid rgba(100, 150, 255, 0.1);
            padding: 40px 30px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4),
                        inset 0 0 60px rgba(0, 0, 0, 0.2);
        }

        /* 头像样式 - 增强毛玻璃效果 */
        .avatar {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 30px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 40px rgba(100, 200, 255, 0.5),
                        0 0 80px rgba(100, 150, 255, 0.3);
            transition: all 0.4s ease;
            position: relative;
            background: rgba(255, 255, 255, 0.05);
        }
        
        .avatar:hover {
            transform: scale(1.05) rotate(5deg);
            box-shadow: 0 0 60px rgba(100, 200, 255, 0.7),
                        0 0 100px rgba(100, 150, 255, 0.5);
        }

        /* 渐变标题样式 */
        h1 {
            font-size: 3.2rem;
            margin-bottom: 15px;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
            background: linear-gradient(45deg, #4fc3f7, #7b68ee, #00bfff, #1e90ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-block;
            animation: gradient-flow 8s ease infinite;
            background-size: 300% 300%;
        }

        @keyframes gradient-flow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .subtitle {
            font-size: 1.3rem;
            color: #aaa;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        /* 毛玻璃联系方式区域 */
        .contact-section {
            margin-top: 30px;
            width: 100%;
        }
        
        .contact-title {
            font-size: 1.6rem;
            margin-bottom: 25px;
            color: #fff;
            padding-bottom: 12px;
            display: inline-block;
            border-bottom: 2px solid rgba(100, 200, 255, 0.5);
        }

        /* 毛玻璃图标按钮 */
        .contact-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #ddd;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            padding: 12px 25px;
            border-radius: 30px;
            background: rgba(40, 40, 80, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 150, 255, 0.2);
        }

        .contact-item:hover {
            color: #fff;
            background: rgba(60, 60, 120, 0.8);
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .contact-item i {
            margin-right: 12px;
            font-size: 1.4rem;
            width: 25px;
            text-align: center;
        }

        /* 毛玻璃QQ群卡片 */
        .group-card {
            background: linear-gradient(135deg, rgba(30, 30, 60, 0.7), rgba(40, 40, 80, 0.7));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(100, 150, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            margin: 0 auto;
        }

        .group-card h3 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 1.5rem;
            text-shadow: 0 0 10px rgba(100, 200, 255, 0.5);
        }

        .group-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .group-id {
            font-size: 1.4rem;
            font-weight: bold;
            color: #4fc3f7;
            letter-spacing: 1px;
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(100, 200, 255, 0.3);
        }
        
        .group-id:hover {
            background: rgba(20, 40, 80, 0.6);
            transform: scale(1.05);
        }

        .group-desc {
            font-size: 1rem;
            color: #aaa;
            margin-top: 15px;
            line-height: 1.6;
        }

        .copy-btn {
            margin-left: 12px;
            color: #fff;
            background: linear-gradient(45deg, #4fc3f7, #1e90ff);
            border: none;
            padding: 6px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .copy-btn:hover {
            background: linear-gradient(45deg, #1e90ff, #4fc3f7);
            transform: scale(1.1);
        }

        footer {
            margin-top: 50px;
            font-size: 0.9rem;
            color: #666;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .main-content {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 2.5rem;
            }
            
            .avatar {
                width: 180px;
                height: 180px;
            }
            
            .contact-item {
                padding: 10px 20px;
                font-size: 1rem;
            }
            
            .group-card {
                padding: 20px;
            }
        }

        @media (max-width: 480px) {
            .contact-links {
                flex-direction: column;
                align-items: center;
            }
            
            .contact-item {
                width: 100%;
                max-width: 300px;
                justify-content: center;
            }
        }
    </style>
</head>

    <script>
        // 创建星空背景
        function createStars() {
            const starsBackground = document.getElementById('starsBackground');
            const starCount = 150;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                const size = Math.random() * 3 + 1;
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                const duration = Math.random() * 4 + 2;
                const delay = Math.random() * 3;
                
                // 随机决定是大星星还是小星星
                if (Math.random() > 0.7) {
                    star.className = 'star large';
                } else {
                    star.className = 'star';
                }
                
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${x}vw`;
                star.style.top = `${y}vh`;
                star.style.opacity = Math.random() * 0.5 + 0.3;
                star.style.animationDuration = `${duration}s`;
                star.style.animationDelay = `${delay}s`;
                
                starsBackground.appendChild(star);
            }
        }

        function copyGroupId() {
            const groupId = document.getElementById('groupId').innerText;
            navigator.clipboard.writeText(groupId).then(() => {
                // 创建提示元素
                const tooltip = document.createElement('div');
                tooltip.textContent = '已复制群号: ' + groupId;
                tooltip.style.position = 'fixed';
                tooltip.style.top = '20px';
                tooltip.style.left = '50%';
                tooltip.style.transform = 'translateX(-50%)';
                tooltip.style.background = 'rgba(30, 30, 60, 0.9)';
                tooltip.style.color = '#4fc3f7';
                tooltip.style.padding = '10px 20px';
                tooltip.style.borderRadius = '10px';
                tooltip.style.zIndex = '1000';
                tooltip.style.boxShadow = '0 5px 15px rgba(0,0,0,0.3)';
                tooltip.style.border = '1px solid rgba(100, 200, 255, 0.3)';
                tooltip.style.backdropFilter = 'blur(10px)';
                
                document.body.appendChild(tooltip);
                
                // 2秒后移除提示
                setTimeout(() => {
                    tooltip.style.opacity = '0';
                    tooltip.style.transition = 'opacity 0.5s ease';
                    setTimeout(() => {
                        document.body.removeChild(tooltip);
                    }, 500);
                }, 2000);
            }).catch(err => {
                console.error('复制失败: ', err);
                alert('复制失败，请手动复制群号');
            });
        }

        // 添加星星点击效果
        document.addEventListener('click', function(e) {
            if (Math.random() > 0.7) { // 30%几率触发星星特效
                const x = e.clientX;
                const y = e.clientY;
                
                const spark = document.createElement('div');
                spark.style.position = 'fixed';
                spark.style.left = `${x}px`;
                spark.style.top = `${y}px`;
                spark.style.width = '4px';
                spark.style.height = '4px';
                spark.style.background = 'white';
                spark.style.borderRadius = '50%';
                spark.style.boxShadow = '0 0 10px rgba(255, 255, 255, 0.8)';
                spark.style.zIndex = '1000';
                spark.style.pointerEvents = 'none';
                
                document.body.appendChild(spark);
                
                // 爆炸效果
                setTimeout(() => {
                    spark.style.transition = 'all 0.5s ease';
                    spark.style.transform = 'scale(3)';
                    spark.style.opacity = '0';
                    
                    setTimeout(() => {
                        document.body.removeChild(spark);
                    }, 500);
                }, 50);
            }
        });

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            createStars();
            
            // 添加背景音乐控制（可选）
            const audioControl = document.createElement('button');
            audioControl.innerHTML = '<i class="fas fa-volume-up"></i>';
            audioControl.style.position = 'fixed';
            audioControl.style.bottom = '20px';
            audioControl.style.right = '20px';
            audioControl.style.zIndex = '100';
            audioControl.style.background = 'rgba(40, 40, 80, 0.6)';
            audioControl.style.color = '#4fc3f7';
            audioControl.style.border = '1px solid rgba(100, 200, 255, 0.3)';
            audioControl.style.borderRadius = '50%';
            audioControl.style.width = '50px';
            audioControl.style.height = '50px';
            audioControl.style.cursor = 'pointer';
            audioControl.style.backdropFilter = 'blur(10px)';
            audioControl.style.fontSize = '1.2rem';
            
            // 如果需要背景音乐，可以在这里添加
            audioControl.addEventListener('click', function() {
                alert('背景音乐功能（可选）');
            });
            
            document.body.appendChild(audioControl);
        });
    </script>
</body>
</html>
