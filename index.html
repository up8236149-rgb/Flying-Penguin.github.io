<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flying Penguin</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{
font-family:'Orbitron',sans-serif;
background:#050505;
color:white;
overflow-x:hidden;
}

/* 星空背景 */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* 导航栏 */

nav{
position:fixed;
top:0;
width:100%;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(10px);
z-index:999;
}

.logo{
font-size:28px;
font-weight:bold;
color:#00ffe1;
text-shadow:0 0 15px #00ffe1;
}

nav ul{
display:flex;
gap:20px;
list-style:none;
}

nav a{
text-decoration:none;
color:white;
transition:0.3s;
}

nav a:hover{
color:#00ffe1;
}

/* 首页 */

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
}

.hero h1{
font-size:70px;
text-shadow:0 0 25px #00ffe1;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{
text-shadow:0 0 10px #00ffe1;
}
to{
text-shadow:0 0 40px #00ffe1;
}
}

.hero p{
margin-top:20px;
font-size:22px;
color:#ccc;
}

/* 按钮 */

.btn{
margin-top:30px;
padding:15px 40px;
border:none;
border-radius:15px;
background:#00ffe1;
color:black;
font-size:18px;
cursor:pointer;
transition:0.3s;
font-weight:bold;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 30px #00ffe1;
}

/* 卡片 */

.section{
padding:120px 10%;
}

.title{
font-size:45px;
margin-bottom:40px;
text-align:center;
color:#00ffe1;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.card{
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:20px;
backdrop-filter:blur(10px);
transition:0.4s;
border:1px solid rgba(255,255,255,0.1);
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 30px #00ffe1;
}

/* 音乐播放器 */

.music-player{
text-align:center;
margin-top:40px;
}

/* AI区域 */

.ai-box{
margin-top:40px;
display:flex;
flex-direction:column;
gap:20px;
}

textarea{
width:100%;
height:150px;
background:#111;
border:none;
color:white;
padding:20px;
border-radius:15px;
font-size:16px;
}

.response{
padding:20px;
background:#111;
border-radius:15px;
min-height:100px;
}

/* 时钟 */

.clock{
font-size:40px;
text-align:center;
margin-top:30px;
color:#00ffe1;
}

/* 图片 */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.gallery img{
width:100%;
border-radius:20px;
transition:0.4s;
}

.gallery img:hover{
transform:scale(1.05);
}

/* footer */

footer{
padding:40px;
text-align:center;
background:black;
margin-top:100px;
}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<nav>

<div class="logo">Flying Penguin</div>

<ul>
<li><a href="#home">首页</a></li>
<li><a href="#functions">功能</a></li>
<li><a href="#gallery">图库</a></li>
<li><a href="#ai">AI</a></li>
</ul>

</nav>

<section class="hero" id="home">

<h1>CYBER WEBSITE</h1>

<p>未来 · 赛博朋克 · AI · 星空</p>

<button class="btn" onclick="openBilibili()">进入我的B站</button>

<button class="btn" onclick="openQQ()">联系QQ</button>

</section>

<section class="section" id="functions">

<h2 class="title">网站功能</h2>

<div class="cards">

<div class="card">
<h3>AI聊天</h3>
<p>未来可接入 DeepSeek / GPT</p>
</div>

<div class="card">
<h3>音乐播放器</h3>
<p>支持自动播放音乐</p>
</div>

<div class="card">
<h3>动态星空</h3>
<p>实时Canvas背景</p>
</div>

<div class="card">
<h3>响应式UI</h3>
<p>支持手机和电脑</p>
</div>

<div class="card">
<h3>赛博朋克风</h3>
<p>霓虹灯视觉效果</p>
</div>

<div class="card">
<h3>动画系统</h3>
<p>炫酷动态交互</p>
</div>

</div>

<div class="clock" id="clock"></div>

<div class="music-player">

<h2 style="margin-bottom:20px;">音乐播放器</h2>

<audio controls autoplay loop>
<source src="https://files.catbox.moe/7w1x8p.mp3" type="audio/mp3">
</audio>

</div>

</section>

<section class="section" id="gallery">

<h2 class="title">图库</h2>

<div class="gallery">

<img src="https://picsum.photos/500/500?1">
<img src="https://picsum.photos/500/500?2">
<img src="https://picsum.photos/500/500?3">
<img src="https://picsum.photos/500/500?4">

</div>

</section>

<section class="section" id="ai">

<h2 class="title">AI聊天模拟</h2>

<div class="ai-box">

<textarea id="userInput" placeholder="输入你的问题..."></textarea>

<button class="btn" onclick="fakeAI()">发送</button>

<div class="response" id="response">
AI将在这里回复...
</div>

</div>

</section>

<footer>

<h2>Flying Penguin © 2026</h2>

<p>Cyberpunk Website</p>

</footer>

<script>

/* B站 */

function openBilibili(){
window.open("https://space.bilibili.com/");
}

/* QQ */

function openQQ(){
window.open("https://wpa.qq.com/msgrd?v=3&uin=2324298768&site=qq&menu=yes");
}

/* AI模拟 */

function fakeAI(){

let input=document.getElementById("userInput").value;

let response=document.getElementById("response");

if(input===""){
response.innerHTML="请输入内容";
return;
}

response.innerHTML="AI正在思考中...";

setTimeout(()=>{

response.innerHTML=
"你输入的是：<br><br>"+input+
"<br><br>这是未来AI功能区域。";

},1500);

}

/* 时钟 */

function updateClock(){

let now=new Date();

let time=now.toLocaleTimeString();

document.getElementById("clock").innerHTML=time;

}

setInterval(updateClock,1000);

/* 星空 */

const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];

for(let i=0;i<300;i++){

stars.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
d:Math.random()*1

});

}

function drawStars(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

ctx.beginPath();

for(let i=0;i<stars.length;i++){

let s=stars[i];

ctx.moveTo(s.x,s.y);

ctx.arc(s.x,s.y,s.r,0,Math.PI*2,true);

}

ctx.fill();

moveStars();

}

function moveStars(){

for(let i=0;i<stars.length;i++){

let s=stars[i];

s.y+=s.d;

if(s.y>canvas.height){

s.y=0;
s.x=Math.random()*canvas.width;

}

}

}

setInterval(drawStars,33);

window.addEventListener("resize",()=>{

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

});

</script>

</body>
</html>
